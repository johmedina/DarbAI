<style>
  @font-face {
    font-family: 'Geist';
    src: url("71ed6abc-d36a-4c87-b881-5c7376f00c0a") format('woff2');
    font-weight: 100 900;
    font-display: swap;
  }
  @font-face {
    font-family: 'Geist Mono';
    src: url("cbae5a13-827a-4f85-a3b5-9e35b9d9d65c") format('woff2');
    font-weight: 100 900;
    font-display: swap;
  }

  :root {
    --bg: #F7F6F1;
    --surface: #FFFFFF;
    --surface-2: #FBFAF5;
    --ink: #1A1813;
    --ink-2: #6B6657;
    --ink-3: #A19C8B;
    --line: #EAE7DD;
    --line-2: #DDD9CC;
    --road: #F2B705;
    --road-deep: #DCA400;
    --reliable: #2F9E6B;
    --reliable-bg: #E9F5EE;
    --reliable-line: #BFE3CF;
    --caution: #CF5C36;
    --caution-bg: #FBEDE6;
    --caution-line: #F1CDBC;
    --user-bubble: #25221C;
    --user-ink: #F7F4EC;
    --shadow-sm: 0 1px 2px rgba(26,24,19,.05), 0 1px 1px rgba(26,24,19,.04);
    --shadow-md: 0 4px 16px -4px rgba(26,24,19,.10), 0 2px 6px -2px rgba(26,24,19,.06);
    --shadow-lg: 0 24px 60px -16px rgba(26,24,19,.22), 0 8px 24px -8px rgba(26,24,19,.12);
    --r-sm: 9px;
    --r-md: 13px;
    --r-lg: 18px;
    --font: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', monospace;
    --font-ar: 'IBM Plex Sans Arabic', 'Geist', sans-serif;
  }

  html[dir="rtl"] { --font: var(--font-ar); }
  /* keep Latin numerals/labels crisp inside RTL where intended */
  .lat { font-family: 'Geist', sans-serif; }

  html[data-theme="dark"] {
    --bg: #121110;
    --surface: #1A1916;
    --surface-2: #221F19;
    --ink: #F4F1E8;
    --ink-2: #A8A491;
    --ink-3: #6F6B5B;
    --line: #2A2823;
    --line-2: #353229;
    --road: #F2B705;
    --road-deep: #C99C12;
    --reliable: #4BC489;
    --reliable-bg: #16271E;
    --reliable-line: #244C38;
    --caution: #E78058;
    --caution-bg: #2A1A12;
    --caution-line: #4A2C1D;
    --user-bubble: #2E2B24;
    --user-ink: #F4F1E8;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
    --shadow-md: 0 4px 16px -4px rgba(0,0,0,.5);
    --shadow-lg: 0 24px 60px -16px rgba(0,0,0,.7);
    --wm-filter: invert(1) hue-rotate(180deg) saturate(1.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  input, textarea { font: inherit; color: inherit; }
  ::selection { background: var(--road); color: #1A1813; }

  /* ── Road lane motif ───────────────────────────────── */
  .road-line {
    height: 8px;
    border-radius: 99px;
    background: var(--ink);
    position: relative;
    overflow: hidden;
  }
  .road-line::after {
    content: "";
    position: absolute;
    left: 6px; right: 6px; top: 50%;
    height: 2px; transform: translateY(-50%);
    background: repeating-linear-gradient(90deg,
      var(--road) 0 11px, transparent 11px 22px);
  }
  .road-strip {
    background: var(--ink);
    position: relative;
    overflow: hidden;
  }
  .road-strip::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 4px; transform: translateY(-50%);
    background: repeating-linear-gradient(90deg,
      var(--road) 0 26px, transparent 26px 52px);
    animation: road-move 1.1s linear infinite;
  }
  @keyframes road-move {
    to { background-position-x: -52px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .road-strip::after { animation: none; }
  }

  /* scrollbars */
  .scroll::-webkit-scrollbar { width: 10px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 99px; border: 3px solid var(--bg); }
  .scroll::-webkit-scrollbar-track { background: transparent; }

  .fade-up { animation: fadeUp .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .pop { animation: pop .35s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes pop { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: none; } }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* theme-aware wordmark swap */
  .wm-d, .wm-l { display: block; }
  .wm-l { display: none; }
  html[data-theme="dark"] .wm-d { display: none; }
  html[data-theme="dark"] .wm-l { display: block; }

  /* sidebar session row */
  .histrow { border-radius: 9px; transition: background .12s; }
  .histrow:hover { background: var(--surface-2); }
  .histrow .sel { color: var(--ink-2); transition: color .12s; }
  .histrow:hover .sel { color: var(--ink); }
  .histrow .dots { opacity: 0; transition: opacity .12s, background .12s; }
  .histrow:hover .dots, .histrow .dots[data-open="true"] { opacity: 1; }
  .histrow .dots:hover { background: var(--line); }
  .menuitem { transition: background .12s; }
  .menuitem:hover { background: var(--surface-2); }
  @media (hover: none) { .histrow .dots { opacity: 1; } }
</style>
</head>
